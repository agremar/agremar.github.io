<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  background: linear-gradient(135deg,#000,#1a0000,#000);
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(0,0,0,0.7);
  position:fixed;
  width:100%;
}

.logo{
  color:red;
  font-size:22px;
  text-shadow:0 0 15px red;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:40px;
  text-shadow:0 0 20px red;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px red;}
  to{ text-shadow:0 0 30px red;}
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  background:red;
  border-radius:25px;
  cursor:pointer;
  box-shadow:0 0 15px red;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card{
  width:90%;
  max-width:250px;
  padding:20px;
  background:#111;
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 20px red;
  transform:translateY(-5px);
}

/* MOBILE */
@media(min-width:768px){
  .hero h1{font-size:70px;}
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">AGREMAR</div>
</div>

<div class="hero">
  <div>
    <h1>AGREMAR</h1>
    <p>Gaming World 🔥</p>
    <div class="btn" onclick="scrollToContent()">Enter</div>
  </div>
</div>

<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future</div>
  </div>
</div>

<script>
function scrollToContent(){
  document.getElementById("content").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
