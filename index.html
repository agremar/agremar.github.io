<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Audiowide&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  overflow-x:hidden;
  background:linear-gradient(135deg,#000,#1a0000,#000);
}

/* NAV */
.nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:rgba(0,0,0,0.8);
  z-index:1000;
}

.logo{
  color:red;
  font-size:20px;
  text-shadow:0 0 15px red;
}

.menu{
  display:flex;
  gap:10px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:13px;
}

/* SIDE NAME */
.side-name{
  position:fixed;
  left:5px;
  top:50%;
  transform:translateY(-50%) rotate(-90deg);
  font-family:'Audiowide',cursive;
  font-size:16px;
  color:red;
  text-shadow:0 0 10px red;
  opacity:0.7;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}

.hero h1{
  font-size:40px;
  color:red;
  text-shadow:0 0 20px red,0 0 40px red;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px red;}
  to{text-shadow:0 0 40px red;}
}

.btn{
  margin-top:20px;
  padding:12px 30px;
  background:red;
  border-radius:25px;
  box-shadow:0 0 20px red;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card{
  width:90%;
  max-width:250px;
  background:#111;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 20px red;
  transform:translateY(-5px);
}

/* VIDEO */
.video iframe{
  width:90%;
  max-width:400px;
  height:220px;
  border-radius:10px;
  margin-top:20px;
}

/* MOBILE */
@media(min-width:768px){
  .hero h1{font-size:70px;}
}
</style>
</head>

<body>

<div class="side-name">AMAN</div>

<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#content">Content</a>
    <a href="#video">Video</a>
    <a href="#about">About</a>
  </div>
</div>

<div class="hero">
  <div>
    <h1>AGREMAR</h1>
    <p>Enter the next generation gaming world 🔥</p>
    <div class="btn" onclick="scrollToContent()">Explore</div>
  </div>
</div>

<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future</div>
  </div>
</div>

<div class="section video" id="video">
  <h2>My Video</h2>
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>

<div class="section" id="about">
  <h2>About</h2>
  <p>This is AGREMAR – building a powerful digital identity 🔥</p>
</div>

<script>
function scrollToContent(){
  document.getElementById("content").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
