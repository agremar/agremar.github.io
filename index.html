<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR FF</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    color:white;
}

/* PARTICLE CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* GLASS BOX */
.box{
    background:rgba(0,0,0,0.5);
    padding:50px 40px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    box-shadow:0 0 60px rgba(255,0,0,0.4);
}

/* LOGO */
.logo{
    font-size:60px;
    font-weight:800;
    color:#ff0000;
    letter-spacing:5px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px red;
    }
    to{
        text-shadow:0 0 40px red,0 0 80px red;
    }
}

/* TAGLINE */
.tagline{
    margin-top:15px;
    font-size:16px;
    color:#ccc;
}

/* BUTTON */
.btn{
    margin-top:25px;
    padding:14px 35px;
    background:linear-gradient(45deg, red, #ff4d4d);
    border-radius:30px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.3s;
    display:inline-block;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px red;
}
</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="hero">
    <div class="box">
        <div class="logo">AGREMAR FF</div>
        <div class="tagline">Dominate Every Match 🔥</div>
        <a href="https://youtube.com" class="btn">Watch Now</a>
    </div>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5)*1,
        dy:(Math.random()-0.5)*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="red";

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0||p.x>canvas.width) p.dx*=-1;
        if(p.y<0||p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
