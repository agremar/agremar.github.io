<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<!-- Gaming Font -->
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family: 'Audiowide', sans-serif;
color:white;
overflow-x:hidden;
background:black;
}

/* NAVBAR */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 25px;
background:rgba(0,0,0,0.7);
z-index:1000;
}

.logo{
color:red;
font-size:22px;
text-shadow:0 0 10px red;
}

.menu a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

.menu a:hover{
color:red;
}

/* HERO SECTION */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

/* AGREMAR TITLE */
h1{
font-size:60px;
color:red;
text-shadow:0 0 20px red, 0 0 40px red;
margin:0;
}

/* SUB TEXT */
p{
font-size:16px;
color:#ddd;
margin:10px 0 20px;
}

/* BUTTON */
.btn{
background:red;
padding:12px 30px;
border-radius:30px;
color:white;
text-decoration:none;
box-shadow:0 0 20px red;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px red;
}

/* AMAN SIDE STYLE */
.aman{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%) rotate(-90deg);
color:#ff0000;
font-size:18px;
letter-spacing:3px;
text-shadow:0 0 10px red, 0 0 20px red;
opacity:0.7;
}

/* SIGNATURE STYLE */
.signature{
margin-top:10px;
font-size:14px;
color:#aaa;
letter-spacing:2px;
}

.signature span{
color:red;
text-shadow:0 0 10px red;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
<div class="logo">AGREMAR</div>
<div class="menu">
<a href="#">Home</a>
<a href="#content">Content</a>
<a href="#about">About</a>
</div>
</div>

<!-- SIDE NAME -->
<div class="aman">AMAN ⚡</div>

<!-- HERO -->
<div class="hero">

<h1>AGREMAR</h1>

<p>Enter the next generation gaming world 🔥</p>

<a href="#content" class="btn">Explore</a>

<div class="signature">
Created by <span>AMAN</span>
</div>

</div>

<!-- CONTENT -->
<div id="content" style="padding:80px 20px; text-align:center;">
<h2>My Content</h2>
<p>Gaming | Videos | Future 🚀</p>
</div>

<!-- ABOUT -->
<div id="about" style="padding:80px 20px; text-align:center;">
<h2>About Me</h2>
<p>This is AGREMAR – building a powerful digital identity.</p>
</div>

</body>
</html>
