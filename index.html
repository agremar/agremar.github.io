<!DOCTYPE html>
<html>
<head>
  <title>AGREMAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      color: white;
      scroll-behavior: smooth;
    }

    /* BACKGROUND IMAGE */
    .hero {
      height: 100vh;
      background: url("https://images.unsplash.com/photo-1605902711622-cfb43c44367f") no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: brightness(0.4);
    }

    h1 {
      font-size: 70px;
      color: red;
      text-shadow: 0 0 30px red;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    /* BUTTON */
    .btn {
      margin-top: 20px;
      padding: 14px 30px;
      background: red;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      border-radius: 30px;
      box-shadow: 0 0 20px red;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
      background: darkred;
    }

    /* SECTION */
    .section {
      padding: 60px 20px;
      background: #000;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 25px;
      width: 250px;
      border-radius: 15px;
      box-shadow: 0 0 20px #222;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 25px red;
    }

    /* NAVBAR */
    .nav {
      position: fixed;
      width: 100%;
      top: 0;
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: rgba(0,0,0,0.7);
    }

    .logo {
      color: red;
      font-size: 22px;
    }

    .menu a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      background: #111;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#home">Home</a>
    <a href="#content">Content</a>
    <a href="#about">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
  <h1>AGREMAR</h1>
  <p>Welcome to my digital world 🔥</p>
  <button class="btn" onclick="scrollToContent()">Explore</button>
</div>

<!-- CONTENT -->
<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">Gaming 🎮</div>
    <div class="card">Videos 🎥</div>
    <div class="card">Future 🚀</div>
  </div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About Me</h2>
  <p>This is AGREMAR – building a powerful digital identity.</p>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 AGREMAR
</div>

<script>
function scrollToContent() {
  document.getElementById("content").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
