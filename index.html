<!DOCTYPE html>
<html>
<head>
  <title>AGREMAR</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f0f0f, #000);
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      color: red;
      font-size: 60px;
      margin-top: 100px;
      text-shadow: 0 0 20px red;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: red;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      box-shadow: 0 0 15px red;
    }

    .btn:hover {
      background: darkred;
    }
  </style>
</head>
<body>

  <h1>AGREMAR</h1>
  <p>Welcome to my official gaming world 🔥</p>

  <button class="btn">Enter</button>

</body>
</html>
