<!DOCTYPE html>
<html>
<head>
  <title>AGREMAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #0a0000, #000000);
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .nav {
      position: fixed;
      width: 100%;
      top: 0;
      display: flex;
      justify-content: space-between;
      padding: 18px 25px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      font-size: 26px;
      color: red;
      text-shadow: 0 0 15px red;
    }

    .menu a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
                  url("https://images.unsplash.com/photo-1511512578047-dfb367046420") no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 80px;
    }

    .hero h1 {
      font-size: 60px;
      color: red;
      text-shadow: 0 0 25px red;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 30px;
      background: red;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      border: none;
    }

    .section {
      padding: 80px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .card {
      background: linear-gradient(145deg, #111, #1a0000);
      border: 1px solid #222;
      padding: 40px;
      width: 300px;
      font-size: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 25px red;
    }

    .video iframe {
      width: 90%;
      max-width: 600px;
      height: 320px;
      border-radius: 10px;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #aaa;
    }

    .credit {
      margin-top: 10px;
      font-size: 15px;
      color: gold;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<canvas id="sparks"></canvas>

<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#home">Home</a>
    <a href="#content">Content</a>
    <a href="#video">Videos</a>
    <a href="#about">About</a>
  </div>
</div>

<div class="hero" id="home">
  <h1>AGREMAR</h1>
  <p>Enter the gaming world 🔥</p>
  <button class="btn" onclick="scrollToContent()">Explore</button>
</div>

<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future Projects</div>
  </div>
</div>

<div class="section" id="video">
  <h2>Latest Video</h2>
  <p>🔥 Gameplay coming soon</p>
  <div class="video">
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>
</div>

<div class="section" id="about">
  <h2>About Me</h2>
  <p>This is AGREMAR – building a powerful gaming identity.</p>
</div>

<div class="footer">
  © 2026 AGREMAR | All Rights Reserved
  <div class="credit">CREATED BY AMAN SAIF</div>
</div>

<script>
function scrollToContent() {
  document.getElementById("content").scrollIntoView({behavior: "smooth"});
}

/* SPARKS ANIMATION */
const canvas = document.getElementById("sparks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let sparks = [];

for(let i=0;i<100;i++){
  sparks.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speedY:Math.random()*1+0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  sparks.forEach(s=>{
    s.y -= s.speedY;
    if(s.y < 0){
      s.y = canvas.height;
      s.x = Math.random()*canvas.width;
    }

    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
