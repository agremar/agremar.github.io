<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* SPARKS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:18px 25px;
background:rgba(0,0,0,0.85);
z-index:1000;
}

.logo{
color:red;
font-size:26px;
text-shadow:0 0 20px red;
}

.menu a{
color:white;
margin-left:25px;
text-decoration:none;
transition:0.3s;
}

.menu a.active{
color:red;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1511512578047-dfb367046420") center/cover;
padding-top:80px;
}

.hero h1{
font-size:65px;
color:red;
text-shadow:0 0 30px red;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px red;}
to{text-shadow:0 0 50px red;}
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
background:red;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px red;
}

/* SECTIONS */
.section{
padding:100px 20px;
text-align:center;
opacity:0;
transform:translateY(50px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:linear-gradient(145deg,#111,#1a0000);
border:1px solid #222;
padding:40px;
width:280px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-12px);
box-shadow:0 0 30px red;
}

/* VIDEO GRID */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

iframe{
width:100%;
height:200px;
border-radius:10px;
}

/* FOOTER */
.footer{
background:#111;
padding:20px;
text-align:center;
}

.credit{
color:gold;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="sparks"></canvas>

<div class="nav">
<div class="logo">AGREMAR</div>
<div class="menu">
<a href="#home">Home</a>
<a href="#content">Content</a>
<a href="#video">Videos</a>
<a href="#about">About</a>
</div>
</div>

<div class="hero" id="home">
<h1>AGREMAR</h1>
<p>Dominate Every Match 🔥</p>
<div class="btn" onclick="scrollToContent()">Explore</div>
</div>

<div class="section" id="content">
<h2>My Content</h2>
<div class="cards">
<div class="card">🎮 Gaming</div>
<div class="card">🎥 Videos</div>
<div class="card">🚀 Future Projects</div>
</div>
</div>

<div class="section" id="video">
<h2>Latest Videos</h2>
<div class="video-grid">

<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>

</div>
</div>

<div class="section" id="about">
<h2>About Me</h2>
<p>AGREMAR – building a powerful gaming identity.</p>
</div>

<div class="footer">
© 2026 AGREMAR  
<div class="credit">CREATED BY AMAN SAIF</div>
</div>

<script>
/* SCROLL */
function scrollToContent(){
document.getElementById("content").scrollIntoView({behavior:"smooth"});
}

/* SCROLL ANIMATION */
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
const pos=sec.getBoundingClientRect().top;
if(pos<window.innerHeight-100){
sec.classList.add('show');
}
});
});

/* SPARKS */
const canvas=document.getElementById("sparks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let sparks=[];
for(let i=0;i<120;i++){
sparks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*1+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
sparks.forEach(s=>{
s.y-=s.speedY;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
