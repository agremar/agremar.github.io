<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* 🔥 LOADER */
#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
}

.loader-logo{
width:140px;
filter: drop-shadow(0 0 40px red);
animation: logoCinematic 3s ease forwards;
}

#loader h2{
color:#ff1a1a;
letter-spacing:6px;
font-weight:bold;
text-shadow:0 0 20px red;
margin-top:10px;
animation: textZoom 3s ease forwards;
}

.tagline{
font-size:14px;
font-weight:700;
letter-spacing:4px;
margin-top:8px;
color:#ff1a1a;
text-shadow:0 0 15px red, 0 0 25px red;
animation: textZoom 3s ease forwards;
}

/* 🔥 ANIMATION */
@keyframes logoCinematic{
0%{transform:scale(0.6); opacity:0;}
30%{transform:scale(1); opacity:1;}
70%{transform:scale(2.5); opacity:1;}
100%{transform:scale(3.5) translateX(-30px); opacity:0;}
}

@keyframes textZoom{
0%{transform:scale(0.6); opacity:0;}
30%{transform:scale(1); opacity:1;}
70%{transform:scale(2); opacity:1;}
100%{transform:scale(2.5) translateX(30px); opacity:0;}
}

/* SPARKS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 25px;
background:rgba(0,0,0,0.85);
z-index:1000;
align-items:center;
}

.nav img{
width:45px;
filter:drop-shadow(0 0 10px red);
}

.menu a{
color:white;
margin-left:20px;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
url("bg.jpg") center/cover no-repeat;
background-position:30% center;
padding-top:80px;
}

.main-logo{
width:220px;
filter: drop-shadow(0 0 60px red);
transition:0.4s;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:14px 30px;
background:red;
border-radius:30px;
cursor:pointer;
box-shadow: 0 0 15px red;
transition:0.3s;
}

.btn:hover{
transform: scale(1.1);
box-shadow: 0 0 30px red;
}

/* SECTION */
.section{
padding:100px 20px;
text-align:center;
opacity:0;
transform:translateY(50px);
transition:1s;
}

.section.show{
opacity:1;
transform:translateY(0);
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background: rgba(255, 0, 0, 0.05);
border: 1px solid rgba(255, 0, 0, 0.2);
backdrop-filter: blur(12px);
padding: 40px;
width: 280px;
border-radius: 20px;
transition: 0.3s;
box-shadow: 0 0 20px rgba(255,0,0,0.2);
text-shadow: 0 0 6px red;
position: relative;
overflow: hidden;
}

.card:hover{
transform: translateY(-10px) scale(1.05);
box-shadow: 0 0 40px red;
}

/* VIDEO */
.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

iframe{
width:100%;
height:200px;
border-radius:10px;
}

/* FOOTER */
.footer{
background:#111;
padding:20px;
text-align:center;
}

.credit{
color:gold;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<img src="logo.png" class="loader-logo">
<h2>AGREMAR</h2>
<p class="tagline">Created by AMAN SAIF</p>
</div>

<canvas id="sparks"></canvas>

<!-- NAV -->
<div class="nav">
<img src="logo.png">
<div class="menu">
<a href="#home">Home</a>
<a href="#content">Content</a>
<a href="#video">Videos</a>
<a href="#about">About</a>
</div>
</div>

<!-- HERO -->
<div class="hero" id="home">
<img src="logo.png" class="main-logo">
<p>DOMINATE EVERY MATCH 🔥</p>
<div class="btn" onclick="scrollToContent()">Explore</div>
</div>

<!-- CONTENT -->
<div class="section" id="content">
<h2>My Content</h2>
<div class="cards">
<div class="card">🎮 Gaming</div>
<div class="card">🎥 Videos</div>
<div class="card">🚀 Future Projects</div>
</div>
</div>

<!-- VIDEOS -->
<div class="section" id="video">
<h2>Latest Videos</h2>
<div class="video-grid">
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
<iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
</div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
<h2>About Me</h2>
<p>AGREMAR – BUILDING A POWERFUL GAMING IDENTITY.</p>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 AGREMAR  
<div class="credit">CREATED BY AMAN SAIF</div>
</div>

<script>

// LOADER FIX
function hideLoader(){
const loader=document.getElementById("loader");
loader.style.opacity="0";
setTimeout(()=>{loader.style.display="none";},800);
}

window.onload=()=>{
setTimeout(hideLoader,2100);
};

// SCROLL
function scrollToContent(){
document.getElementById("content").scrollIntoView({behavior:"smooth"});
}

// SECTION ANIMATION
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
const pos=sec.getBoundingClientRect().top;
if(pos < window.innerHeight-100){
sec.classList.add('show');
}
});
});

// SPARKS
const canvas=document.getElementById("sparks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let sparks=[];
for(let i=0;i<120;i++){
sparks.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedY:Math.random()*1+0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
sparks.forEach(s=>{
s.y-=s.speedY;
if(s.y<0){
s.y=canvas.height;
s.x=Math.random()*canvas.width;
}
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
