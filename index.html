<!DOCTYPE html>
<html>
<head>
  <title>AGREMAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: #111;
    }

    .logo {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }

    .menu a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
      background: radial-gradient(circle, #111, #000);
    }

    .hero h1 {
      font-size: 60px;
      color: red;
      text-shadow: 0 0 20px red;
    }

    .hero p {
      opacity: 0.8;
      margin: 10px 0;
    }

    .btn {
      padding: 12px 25px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 15px;
      border-radius: 5px;
      box-shadow: 0 0 10px red;
    }

    /* SECTION */
    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px #222;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      background: #111;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="nav">
    <div class="logo">AGREMAR</div>
    <div class="menu">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Content</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>AGREMAR</h1>
    <p>Welcome to my digital world 🔥</p>
    <button class="btn">Explore</button>
  </div>

  <!-- CONTENT -->
  <div class="section">
    <h2>My Content</h2>
    <div class="cards">
      <div class="card">Gaming 🎮</div>
      <div class="card">Videos 🎥</div>
      <div class="card">Future Projects 🚀</div>
    </div>
  </div>

  <!-- ABOUT -->
  <div class="section">
    <h2>About Me</h2>
    <p>This is AGREMAR – building a powerful digital identity.</p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 AGREMAR | All Rights Reserved
  </div>

</body>
</html>
