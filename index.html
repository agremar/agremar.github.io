<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  overflow:hidden;
  background:black;
  color:white;
}

/* CANVAS FULL */
canvas {
  position:fixed;
  top:0;
  left:0;
}

/* UI LAYER */
.ui {
  position:absolute;
  top:0;
  width:100%;
  text-align:center;
  z-index:10;
}

.logo {
  font-size:40px;
  margin-top:20px;
  background:linear-gradient(red,orange);
  -webkit-background-clip:text;
  color:transparent;
}

.btn {
  margin-top:40px;
  padding:15px 40px;
  border:2px solid red;
  border-radius:30px;
  display:inline-block;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  background:red;
}
</style>
</head>

<body>

<div class="ui">
  <div class="logo">AGREMAR</div>
  <div class="btn">ENTER GAME</div>
</div>

<canvas id="c"></canvas>

<script>
// BASIC 3D EFFECT (fake 3D particles depth)
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    z:Math.random()*1000
  });
}

function animate(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    s.z-=2;
    if(s.z<=0) s.z=1000;

    let k=128/s.z;
    let x=s.x*k+canvas.width/2;
    let y=s.y*k+canvas.height/2;

    let size=(1-s.z/1000)*3;

    ctx.fillStyle="red";
    ctx.fillRect(x,y,size,size);
  });

  requestAnimationFrame(animate);
}
animate();

// PARALLAX
document.addEventListener("mousemove",e=>{
  let x=e.clientX/window.innerWidth;
  let y=e.clientY/window.innerHeight;

  stars.forEach(s=>{
    s.x+= (x-0.5)*2;
    s.y+= (y-0.5)*2;
  });
});
</script>

</body>
</html>
