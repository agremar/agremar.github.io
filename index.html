<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Audiowide&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND IMAGE + DARK OVERLAY */
.hero{
  height:100vh;
  background: 
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:80px 15px 20px;
}

/* NAVBAR FIX */
.nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:rgba(0,0,0,0.8);
  z-index:1000;
  box-sizing:border-box;
}

/* LOGO */
.logo{
  color:red;
  font-size:20px;
  text-shadow:0 0 15px red;
}

/* MENU FIX (NO CUT) */
.menu{
  display:flex;
  gap:10px;
}

.menu a{
  color:white;
  text-decoration:none;
  font-size:13px;
}

/* SIDE NAME */
.side-name{
  position:fixed;
  left:5px;
  top:50%;
  transform:translateY(-50%) rotate(-90deg);
  font-family:'Audiowide',cursive;
  font-size:16px;
  color:red;
  text-shadow:0 0 10px red;
  opacity:0.6;
}

/* TEXT */
.hero h1{
  font-size:40px;
  color:red;
  text-shadow:0 0 20px red,0 0 40px red;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px red;}
  to{text-shadow:0 0 40px red;}
}

.hero p{
  font-size:14px;
}

/* BUTTON */
.btn{
  margin-top:20px;
  padding:12px 25px;
  background:red;
  border-radius:25px;
  box-shadow:0 0 20px red;
  cursor:pointer;
}

/* SECTION */
.section{
  padding:50px 15px;
  text-align:center;
  background:#000;
}

/* MOBILE FIX */
@media(min-width:768px){
  .hero h1{font-size:70px;}
  .menu a{font-size:16px;}
}
</style>
</head>

<body>

<div class="side-name">AMAN</div>

<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#content">Content</a>
    <a href="#about">About</a>
  </div>
</div>

<div class="hero">
  <div>
    <h1>AGREMAR</h1>
    <p>Enter the next generation gaming world 🔥</p>
    <div class="btn" onclick="scrollToContent()">Explore</div>
  </div>
</div>

<div class="section" id="content">
  <h2>My Content</h2>
  <p>Gaming | Videos | Future 🚀</p>
</div>

<div class="section" id="about">
  <h2>About</h2>
  <p>This is AGREMAR – powerful digital identity 🔥</p>
</div>

<script>
function scrollToContent(){
  document.getElementById("content").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
