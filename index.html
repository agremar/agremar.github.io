<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #050505, #0d0d0d, #1a0000);
  color: white;
}

/* NAVBAR */
.nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.logo {
  color: #ff1a1a;
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow: 0 0 20px red;
}

.menu a {
  margin-left: 25px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.menu a:hover {
  color: red;
}

/* HERO */
.hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1542751371-adc38448a05e") no-repeat center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: 75px;
  color: #ff1a1a;
  text-shadow: 0 0 30px red;
}

.hero p {
  opacity: 0.8;
  margin-top: 10px;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 14px 35px;
  background: linear-gradient(45deg, red, darkred);
  border: none;
  color: white;
  font-size: 18px;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 0 25px red;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTION */
.section {
  padding: 80px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 30px;
}

/* CARDS */
.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
}

.card {
  background: linear-gradient(145deg, #0a0a0a, #1a0000);
  padding: 30px;
  width: 250px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 20px #111;
}

.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 0 30px red;
}

/* VIDEO */
iframe {
  width: 90%;
  max-width: 500px;
  height: 280px;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  background: #0a0a0a;
  padding: 20px;
  text-align: center;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#content">Content</a>
    <a href="#video">Video</a>
    <a href="#about">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>AGREMAR</h1>
    <p>Enter the next generation gaming world 🔥</p>
    <button class="btn" onclick="scrollToContent()">Explore</button>
  </div>
</div>

<!-- CONTENT -->
<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future Projects</div>
  </div>
</div>

<!-- VIDEO -->
<div class="section" id="video">
  <h2>Latest Video</h2>
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About AGREMAR</h2>
  <p>Building a powerful gaming identity with creativity and passion.</p>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 AGREMAR | All Rights Reserved
</div>

<script>
function scrollToContent() {
  document.getElementById("content").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
