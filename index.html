<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR FF</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#0d0d0d;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#000;
    position:sticky;
    top:0;
}

nav h1{
    color:red;
}

nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}

/* HERO */
.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(to bottom, #000, #1a0000);
}

.hero h2{
    font-size:40px;
    color:red;
}

.hero p{
    margin-top:10px;
}

.btn{
    margin-top:20px;
    padding:10px 25px;
    background:red;
    border-radius:25px;
    text-decoration:none;
    color:white;
}

/* SECTION */
.section{
    padding:60px 20px;
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:15px;
    border-radius:10px;
}

/* FOOTER */
.footer{
    background:black;
    padding:20px;
    text-align:center;
    color:#777;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>AGREMAR FF</h1>
    <div>
        <a href="#home">Home</a>
        <a href="#videos">Videos</a>
        <a href="#about">About</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
    <h2>AGREMAR FF</h2>
    <p>Dominate Every Match 🔥</p>
    <a href="https://youtube.com" class="btn">Watch Channel</a>
</div>

<!-- VIDEOS -->
<div class="section" id="videos">
    <h2>Latest Videos</h2>
    <div class="grid">
        <div class="card">Video Coming Soon</div>
        <div class="card">Video Coming Soon</div>
        <div class="card">Video Coming Soon</div>
    </div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
    <h2>About Me</h2>
    <p>I upload Free Fire gameplay, highlights, and pro skills.</p>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 AGREMAR FF
</div>

</body>
</html>
