<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR FF</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: #000;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#111;
}

nav h1{
    color:red;
    margin:0;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:15px;
}

/* HERO */
.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background: linear-gradient(to bottom, #000, #1a0000);
}

.hero h2{
    font-size:40px;
    color:red;
}

.hero p{
    margin-top:10px;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:10px 25px;
    background:red;
    border-radius:25px;
    text-decoration:none;
    color:white;
}

/* SECTION */
.section{
    padding:40px 20px;
    text-align:center;
}

/* FOOTER */
.footer{
    background:#111;
    padding:20px;
    text-align:center;
    color:#888;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>AGREMAR FF</h1>
    <div>
        <a href="#">Home</a>
        <a href="#">Videos</a>
        <a href="#">About</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h2>AGREMAR FF</h2>
    <p>Dominate Every Match 🔥</p>
    <a href="https://youtube.com" class="btn">Watch Channel</a>
</div>

<!-- VIDEOS -->
<div class="section">
    <h2>Videos</h2>
    <p>Coming Soon...</p>
</div>

<!-- ABOUT -->
<div class="section">
    <h2>About</h2>
    <p>Free Fire gameplay, highlights and pro skills.</p>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 AGREMAR FF
</div>

</body>
</html>
