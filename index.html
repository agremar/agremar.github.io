<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:black;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle,#000,#1a0000,#000);
  z-index:-3;
}

/* NAV */
.nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
}

.logo{
  font-size:26px;
  background:linear-gradient(red,orange);
  -webkit-background-clip:text;
  color:transparent;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:80px;
  background:linear-gradient(red,orange);
  -webkit-background-clip:text;
  color:transparent;
}

/* BUTTON */
.btn{
  padding:15px 40px;
  border:2px solid red;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:red;
  left:-100%;
  top:0;
  transition:0.4s;
}

.btn:hover::before{
  left:0;
}

.btn span{
  position:relative;
  z-index:1;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

/* CARDS */
.cards{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  width:250px;
  height:200px;
  background:#111;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  position:relative;
}

/* NEON BORDER */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:15px;
  padding:2px;
  background:linear-gradient(45deg,red,orange);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
}

.card:hover{
  transform:scale(1.1) rotateY(10deg);
  box-shadow:0 0 40px red;
}

/* SCROLL ANIMATION */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="nav">
  <div class="logo">AGREMAR</div>
</div>

<div class="hero">
  <div>
    <h1>AGREMAR</h1>
    <div class="btn"><span>ENTER</span></div>
  </div>
</div>

<div class="section fade">
  <h2>CONTENT</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future</div>
  </div>
</div>

<script>
// SCROLL ANIMATION
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade").forEach(el=>{
  observer.observe(el);
});
</script>

</body>
</html>
