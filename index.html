<!DOCTYPE html>
<html>
<head>
  <title>AGREMAR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at center, #0a0000, #000000);
      color: white;
    }

    /* NAVBAR */
    .nav {
      position: fixed;
      width: 100%;
      top: 0;
      display: flex;
      justify-content: space-between;
      padding: 18px 25px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      font-size: 26px;
      color: red;
      text-shadow: 0 0 15px red;
    }

    .menu a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
                  url("https://images.unsplash.com/photo-1511512578047-dfb367046420") no-repeat center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 70px;
    }

    .hero h1 {
      font-size: 60px;
      color: red;
      text-shadow: 0 0 25px red;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 30px;
      background: red;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      border: none;
    }

    /* SECTION */
    .section {
      padding: 80px 20px;
      text-align: center;
    }

    /* BIG CARDS */
    .cards {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
    }

    .card {
      background: #111;
      padding: 40px;
      width: 300px;
      font-size: 20px;
      border-radius: 15px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 25px red;
    }

    /* VIDEO */
    .video iframe {
      width: 90%;
      max-width: 600px;
      height: 320px;
      border-radius: 10px;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: #aaa;
    }

    .credit {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">AGREMAR</div>
  <div class="menu">
    <a href="#home">Home</a>
    <a href="#content">Content</a>
    <a href="#video">Videos</a>
    <a href="#about">About</a>
  </div>
</div>

<!-- HERO -->
<div class="hero" id="home">
  <h1>AGREMAR</h1>
  <p>Enter the gaming world 🔥</p>
  <button class="btn" onclick="scrollToContent()">Explore</button>
</div>

<!-- CONTENT -->
<div class="section" id="content">
  <h2>My Content</h2>
  <div class="cards">
    <div class="card">🎮 Gaming</div>
    <div class="card">🎥 Videos</div>
    <div class="card">🚀 Future Projects</div>
  </div>
</div>

<!-- VIDEO -->
<div class="section" id="video">
  <h2>Latest Video</h2>
  <div class="video">
    <!-- Yaha future me sirf link change karna -->
    <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About Me</h2>
  <p>This is AGREMAR – building a powerful gaming identity.</p>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 AGREMAR | All Rights Reserved
  <div class="credit">Created by AMAN</div>
</div>

<script>
function scrollToContent() {
  document.getElementById("content").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
