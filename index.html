<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGREMAR FF</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') no-repeat center center/cover;
    color:white;
}

/* DARK OVERLAY */
.overlay{
    background: rgba(0,0,0,0.75);
    min-height:100vh;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* LOGO TEXT */
.logo{
    font-size:70px;
    font-weight:bold;
    color:red;
    text-shadow:0 0 20px red, 0 0 40px red;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px red;}
    to{ text-shadow:0 0 40px red,0 0 80px red;}
}

/* TAGLINE */
.tagline{
    margin-top:10px;
    color:#ccc;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:12px 30px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:30px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    background:#ff3333;
}

/* SECTION */
.section{
    padding:60px 20px;
    text-align:center;
}

/* VIDEO GRID */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px red;
}

/* PLACEHOLDER BOX */
.placeholder{
    height:200px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#aaa;
    border:2px dashed #444;
    border-radius:10px;
}

/* FOOTER */
.footer{
    background:black;
    padding:20px;
    text-align:center;
    color:#777;
}
</style>

</head>

<body>

<div class="overlay">

<!-- HERO -->
<div class="hero">
    <div class="logo">AGREMAR FF</div>
    <div class="tagline">Dominate Every Match 🔥</div>
    <a href="https://youtube.com" class="btn">Watch Now</a>
</div>

<!-- VIDEOS -->
<div class="section">
    <h2 style="color:red;">🔥 Latest Videos</h2>

    <div class="grid">

        <div class="card">
            <div class="placeholder">Video Coming Soon</div>
        </div>

        <div class="card">
            <div class="placeholder">Video Coming Soon</div>
        </div>

        <div class="card">
            <div class="placeholder">Video Coming Soon</div>
        </div>

    </div>
</div>

<!-- ABOUT -->
<div class="section">
    <h2 style="color:red;">About AGREMAR FF</h2>
    <p>Pro Free Fire gameplay, clutch moments, and dominating skills. Subscribe and join the squad.</p>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 AGREMAR FF | All Rights Reserved
</div>

</div>

</body>
</html>
